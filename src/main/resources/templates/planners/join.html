<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>Let's Plan</title>
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(
            180deg,
            rgba(245, 251, 255, 0.62),
            rgba(232, 246, 255, 0.78) 54%,
            rgba(255, 255, 255, 0.96)
          ),
          url("https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=1800&q=80")
            center 38% / cover fixed;
        color: #111;
        font-family:
          "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI",
          sans-serif;
        line-height: 1.5;
        letter-spacing: 0;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      header {
        width: 100%;
      }

      .page-container {
        display: flex;
        justify-content: center;
        min-height: calc(100vh - 76px);
        padding: 96px 24px 56px;
      }

      .join-panel {
        display: flex;
        flex-direction: column;
        width: min(100%, 700px);
        margin: 0 auto;
        padding: 40px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
        backdrop-filter: blur(14px);
      }

      .page-title {
        grid-column: 1 / -1;
        width: 100%;
        margin: 0 0 22px;
        color: #10203f;
        font-size: 34px;
        font-weight: 900;
        line-height: 1.2;
        text-align: center;
        text-shadow: 0 1px 12px rgba(255, 255, 255, 0.76);
      }

      .form-column {
        min-width: 0;
        padding-top: 2px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
      }

      .form-group label {
        margin: 0;
        color: #10203f;
        font-size: 22px;
        font-weight: 800;
        line-height: 1.2;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.92);
        border-radius: 14px;
        padding: 11px 14px;
        background: rgba(255, 255, 255, 0.96);
        color: #0f172a;
        font: inherit;
        font-size: 16px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }

      .form-group input,
      .form-group select {
        height: 46px;
      }

      .form-group select {
        appearance: none;
        cursor: pointer;
      }

      .form-group textarea {
        min-height: 180px;
        resize: vertical;
        line-height: 1.45;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        border-color: #2563eb;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13);
      }

      .button-row {
        display: grid;
        gap: 12px;
      }

      .submit-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 48px;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s,
          background 0.2s;
        border: none;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #fff;
        box-shadow: 0 14px 26px rgba(37, 99, 235, 0.28);
      }

      .submit-btn:hover {
        transform: translateY(-1px);
        background: linear-gradient(135deg, #1d4ed8, #1e40af);
      }

      @media (max-width: 760px) {
        .page-container {
          padding: 88px 18px 40px;
        }
      }
    </style>
  </head>

  <body>
    <div th:replace="~{layout/header}"></div>
    <main class="page-container" sec:authorize="isAuthenticated()">
      <form
        id="application-form"
        class="join-panel"
        onsubmit="
          event.preventDefault();
          submitApplication();
        "
      >
        <h1 class="page-title">그룹 가입 신청서</h1>

        <!-- 질문 항목들이 들어갈 공간 -->
        <div id="questions-container" class="form-column"></div>

        <!-- 제출 버튼 영역 -->
        <div class="button-row" style="margin-top: 30px">
          <button type="submit" class="submit-btn">가입 신청하기</button>
        </div>
      </form>
    </main>

    <!-- 헤더 메뉴 및 알림 버튼 동작을 위한 JS 추가 -->
    <script th:src="@{/js/header.js}"></script>

    <script th:inline="javascript">
      const tid = /*[[${tid}]]*/ "tid";

      document.addEventListener("DOMContentLoaded", function () {
        fetch(`/planners/join/${tid}/form`)
          .then((res) => res.json())
          .then((serverData) => {
            if (serverData && serverData.length > 0) {
              renderForm(serverData);
            } else {
              document.getElementById("questions-container").innerHTML =
                "<p>등록된 가입 양식이 없습니다.</p>";
            }
          });
      });

      function renderForm(schema) {
        const container = document.getElementById("questions-container");
        container.innerHTML = "";
        schema.forEach((item, index) => {
          const div = document.createElement("div");

          div.className = "form-group";
          div.innerHTML = `
      <label class="question-label"></label>
      <input type="hidden" class="answer-question">
      <textarea class="answer-input" required placeholder="답변을 입력해주세요"></textarea>
    `;
          div.querySelector(".question-label").textContent =
            `${index + 1}. ${item.question}`;
          div.querySelector(".answer-question").value = item.question;
          container.appendChild(div);
        });
      }

      function submitApplication() {
        const questions = document.querySelectorAll(".answer-question");
        const answers = document.querySelectorAll(".answer-input");
        const submitData = [];

        let hasEmpty = false;
        questions.forEach((q, index) => {
          if (answers[index].value.trim() === "") hasEmpty = true;
          submitData.push({
            question: q.value,
            answer: answers[index].value,
          });
        });

        if (hasEmpty) {
          alert("모든 항목을 입력해주세요.");
          return;
        }

        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector(
          'meta[name="_csrf_header"]',
        ).content;

        fetch(`/planners/join/${tid}/apply`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            [csrfHeader]: csrfToken,
          },
          body: JSON.stringify({ answers: submitData }),
        }).then((response) => {
          if (response.status === 200) {
            alert("가입 신청이 완료되었습니다. 관리자 승인을 기다려주세요.");
            window.location.href = "/planners?tid=" + tid;
          } else {
            alert("이미 가입신청을 넣은 플래너즈입니다.");
            window.location.href = "/planners?tid=" + tid;
          }
        });
      }
    </script>
  </body>
</html>
