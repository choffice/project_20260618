<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>플래너즈 :: 관리자 페이지</title>
<div th:replace="~{layout/chat_socket}"></div>
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/plannersTap.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <style>
      article {
        margin: 20px auto;
      }

      article.p_info {
        padding: 20px 30px;
        border-radius: 15px;
        background: #fff;
        box-shadow:
          0 5px 9px rgba(80, 80, 80, 0.3),
          0 -2px 3px rgba(100, 100, 100, 0.1);
      }

      .p_info {
        height: auto;
        clear: both;
        width: 80%;
        margin: 0 auto;
        /*첫 번째가 margin-block,  두 번째가 margin-inline(auto는 좌우 동일하게 자동 맞춤)*/
      }

      .title {
        border-bottom: 1px solid var(--border);
      }

      .admin-title {
        font-size: 2.5rem;
        font-weight: bold;
        margin-top: 0px;
        width: 100%;
        text-align: center;
        height: fit-content;
      }

      .container {
        display: flex;
        gap: 20px;
        margin-top: 40px;
      }

      .btn-box {
        display: flex;
        flex-direction: column;
        max-width: 170px;
      }

      .interact-btn {
        margin-top: 20px;
        padding: 10px 15px;
        font-size: 1.2rem;
        min-width: 150px;
        border-radius: 10px;
        background: white;
        box-shadow: 0 3px 6px rgba(80, 80, 80, 0.3);
      }

      .display-box {
        align-content: center;
        flex: 1;
        padding: 20px 30px;
        border-radius: 15px;
        background: #fff;
      }

      .modify-panel {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr);
        gap: 32px;
        align-items: start;
      }

      .interact-btn.active {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
      }

      .interact-btn:not(.active):hover {
        color: #2563eb;
        font-weight: bold;
        cursor: pointer;
      }

      .media-column {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .upload-block {
        display: flex;
        flex-direction: column;
      }

      .upload-block h2,
      .visibility-title {
        margin: 0 0 10px;
        color: #10203f;
        font-size: 22px;
        font-weight: 800;
        line-height: 1.2;
      }

      .required {
        color: #ff2f2f;
        font-weight: 800;
      }

      .image-preview {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.82);
        border-radius: 18px;
        background: rgba(248, 250, 252, 0.88);
        cursor: pointer;
        transition:
          transform 0.2s,
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .image-preview img {
        width: 35%;
        height: 45%;
        object-fit: contain;
        opacity: 0.72;
      }

      .image-preview.has-uploaded-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 1;
      }

      .thumbnail-preview {
        aspect-ratio: 1 / 1;
      }

      .banner-preview {
        aspect-ratio: 3 / 2;
      }

      .image-size {
        margin: 8px 0 6px;
        text-align: center;
        font-size: 12px;
        color: #64748b;
        font-weight: 700;
      }

      .file-trigger {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 34px;
        margin: 0 auto;
        border: 1px solid rgba(148, 163, 184, 0.8);
        border-radius: 999px;
        background: #ffffff;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.2s;
      }

      .file-trigger:hover {
        transform: translateY(-1px);
        border-color: #2563eb;
        background: #eff6ff;
      }

      .file-trigger svg {
        width: 18px;
        height: 18px;
        stroke: #111;
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .upload-block input[type="file"] {
        display: none;
      }

      .form-column {
        min-width: 0;
        padding-top: 2px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
      }

      .form-group label {
        margin: 0;
        color: #10203f;
        font-size: 22px;
        font-weight: 800;
        line-height: 1.2;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.92);
        border-radius: 14px;
        padding: 11px 14px;
        background: rgba(255, 255, 255, 0.96);
        color: #0f172a;
        font: inherit;
        font-size: 16px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }

      .form-group input,
      .form-group select {
        height: 46px;
      }

      .form-group select {
        appearance: none;
        cursor: pointer;
      }

      .form-group textarea {
        min-height: 180px;
        resize: vertical;
        line-height: 1.45;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus,
      .visibility-card:has(input:focus-visible) {
        border-color: #2563eb;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13);
      }

      .field-help {
        margin: 0;
        color: #64748b;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.4;
      }

      .visibility-group {
        margin-bottom: 22px;
      }

      .visibility-options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .visibility-card {
        position: relative;
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 10px;
        min-height: 92px;
        border: 1px solid rgba(148, 163, 184, 0.92);
        border-radius: 18px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.9);
        cursor: pointer;
        transition:
          transform 0.2s,
          border-color 0.2s,
          background 0.2s,
          box-shadow 0.2s;
      }

      .visibility-card:hover {
        transform: translateY(-2px);
        border-color: #2563eb;
        box-shadow: 0 12px 24px rgba(37, 99, 235, 0.11);
      }

      .visibility-card input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .visibility-card:has(input:checked) {
        border-color: #2563eb;
        background: linear-gradient(180deg, #ffffff, #eff6ff);
        box-shadow:
          inset 0 0 0 1px #2563eb,
          0 14px 28px rgba(37, 99, 235, 0.14);
      }

      .visibility-icon {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .visibility-icon svg {
        width: 44px;
        height: 44px;
        stroke: #1e3a8a;
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .visibility-text {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        min-width: 0;
      }

      .visibility-name {
        font-size: 16px;
        font-weight: 800;
        color: #10203f;
      }

      .visibility-desc {
        font-size: 12px;
        line-height: 1.35;
        color: #64748b;
        font-weight: 700;
      }

      .button-row {
        display: grid;
        gap: 12px;
      }

      .submit-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 48px;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s,
          background 0.2s;
        border: none;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #fff;
        box-shadow: 0 14px 26px rgba(37, 99, 235, 0.28);
      }

      .submit-btn:hover {
        transform: translateY(-1px);
        background: linear-gradient(135deg, #1d4ed8, #1e40af);
      }

      .invite-email {
        display: flex;
        align-items: center;
        justify-self: center;
        width: 50%;
        padding: 12px;
        border: 1px solid rgba(148, 163, 184, 0.92);
        border-radius: 14px;
      }

      .email-list-box {
        display: none;
        margin-top: 20px;
        border: 1px solid rgba(148, 163, 184, 0.92);
        border-radius: 14px;
        align-content: center;
        justify-content: center;
        justify-self: center;
        flex-direction: column;
        max-height: 300px;
        overflow: auto;
        width: 50%;
      }

      .email-list {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
      }

      .email-list:hover {
        background: rgba(148, 163, 184, 0.1);
        cursor: pointer;
      }

      .delete-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        justify-self: center;
        margin-top: 30px;
        width: 10%;
        height: 48px;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s,
          background 0.2s;
        border: none;
        background: linear-gradient(135deg, #f71616, #f0062d);
        color: #fff;
        box-shadow: 0 14px 26px rgba(37, 99, 235, 0.28);
      }

      .delete-btn:hover {
        background: linear-gradient(135deg, #f0062d, #c51111);
      }

      .activity-list-box {
        display: block;
        margin-top: 20px;
        border: none;
        border-radius: 14px;
        align-content: center;
        justify-content: center;
        justify-self: center;
        flex-direction: column;
        max-height: 300px;
        overflow: auto;
        width: 50%;
      }

      .add-activity {
        display: flex;
        align-items: center;
        justify-self: center;
        width: 50%;
        padding: 12px;
        border: 1px solid rgba(148, 163, 184, 0.92);
        border-radius: 14px;
      }

      .activity-block-list {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
      }

      .activity-block-list:hover {
        background: rgba(148, 163, 184, 0.1);
        cursor: pointer;
      }

      @media (max-width: 760px) {
        .page-container {
          padding: 88px 18px 40px;
        }

        .modify-panel {
          grid-template-columns: 1fr;
          gap: 28px;
          padding: 24px;
        }

        .media-column {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 18px;
        }

        .visibility-options {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .form-row {
          grid-template-columns: 1fr;
          gap: 0;
        }
      }

      @media (max-width: 480px) {
        .media-column {
          grid-template-columns: 1fr;
        }
      }

      .question-btn {
        padding:10px; 
        margin-top:10px; 
        border-radius:8px; 
        border:1px solid #ccc; 
        background:#fff; 
        cursor:pointer;}

      .form-btn {
        padding:10px; 
        margin-top:10px; 
        border-radius:8px; 
        border:none; 
        background:#2563eb; 
        color:#fff; 
        cursor:pointer;
        }

    </style>
  </head>

  <body style="display: none">
    <div th:replace="~{layout/header}"></div>
    <th:block>
      <main class="detail-main">
        <div class="detail-shell">
          <div th:replace="~{layout/plannersTap}"></div>
          <article class="detail-card">
            <section class="info-section">
              <div class="title">
                <h2 class="admin-title">관리자 페이지</h2>
              </div>
              
          <div class="container">
            <div class="btn-box">
              <button class="interact-btn active" onclick="showTab('modify-planners')">플래너즈 수정</button>
              <button class="interact-btn" onclick="showTab('invite-planners')">플래너 초대</button>
              <button class="interact-btn" onclick="showTab('delete-planners')">플래너즈 삭제</button>
              <button class="interact-btn" onclick="showTab('join-planners')">가입 양식</button>
              <button class="interact-btn" onclick="showTab('manage-applications')">가입 신청 관리</button>
              <button class="interact-btn" onclick="showTab('schedule-block')">일정 블록 관리</button>
            </div>
            <div class="display-box">

              <div id="modify-planners" class="tab-content">
                <form class="modify-panel" id="plannersModifyForm" th:action="@{/planners/modify}" method="post"
                  enctype="multipart/form-data" novalidate>
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                  <aside class="media-column" aria-label="플래너즈 이미지">
                    <div class="upload-block">
                      <h2>썸네일</h2>
                      <label class="image-preview thumbnail-preview" id="thumbnailPreview" for="plannersThumbnail"
                        th:classappend="${plannersModifyThumbnail != null && #strings.startsWith(plannersModifyThumbnail, '/plannersThumbnail/') ? ' has-uploaded-image' : ''}">
                        <img
                          th:src="${plannersModifyThumbnail != null && plannersModifyThumbnail != '' ? plannersModifyThumbnail : '/img/thumbnail.png'}"
                          alt="기본 썸네일">
                      </label>
                      <p class="image-size"></p>
                      <label class="file-trigger" for="plannersThumbnail" aria-label="썸네일 사진 선택">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                          <path d="M12 15V4"></path>
                          <path d="M8 8l4-4 4 4"></path>
                          <path d="M5 14v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"></path>
                        </svg>
                      </label>
                      <input type="file" id="plannersThumbnail" name="plannersThumbnailFile" accept="image/*">
                    </div>

                    <div class="upload-block">
                      <h2>배너</h2>
                      <label class="image-preview banner-preview" id="bannerPreview" for="plannersBanner"
                        th:classappend="${plannersModifyBanner != null && #strings.startsWith(plannersModifyBanner, '/plannersBanner/') ? ' has-uploaded-image' : ''}">
                        <img
                          th:src="${plannersModifyBanner != null && plannersModifyBanner != '' ? plannersModifyBanner : '/img/banner.png'}"
                          alt="기본 배너">
                      </label>
                      <p class="image-size"></p>
                      <label class="file-trigger" for="plannersBanner" aria-label="배너 사진 선택">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                          <path d="M12 15V4"></path>
                          <path d="M8 8l4-4 4 4"></path>
                          <path d="M5 14v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"></path>
                        </svg>
                      </label>
                      <input type="file" id="plannersBanner" name="plannersBannerFile" accept="image/*">
                    </div>
                  </aside>

                  <section class="form-column" aria-label="플래너즈 정보">

                    <div class="form-group">
                      <label for="description">플래너즈 설명</label>
                      <textarea id="description" name="description" maxlength="255" th:text="${plannersDTO.description}"
                        required></textarea>
                      <p class="field-help">플래너즈의 목적, 활동 내용 등을 소개해보세요.</p>
                    </div>

                    <div class="form-group">
                      <label for="maxPopulation">플래너즈 인원 제한 <span class="required">*</span></label>
                      <input type="number" id="maxPopulation" name="maxPopulation" min="1" max="100" step="1"
                        th:value="${plannersDTO.maxPopulation}" required>
                      <p class="field-help">플래너즈에 가입할 수 있는 최대 인원을 설정하세요. (1 ~ 100명)</p>
                    </div>

                    <div class="visibility-group">
                      <div class="visibility-title">플래너즈 공개 여부 <span class="required">*</span></div>
                      <div class="visibility-options">
                        <label class="visibility-card">
                          <input type="radio" name="status" value="PUBLIC" checked>
                          <span class="visibility-icon" aria-hidden="true">
                            <svg viewBox="0 0 48 48">
                              <circle cx="24" cy="24" r="17"></circle>
                              <path d="M7 24h34"></path>
                              <path d="M24 7c5 5 8 11 8 17s-3 12-8 17"></path>
                              <path d="M24 7c-5 5-8 11-8 17s3 12 8 17"></path>
                            </svg>
                          </span>
                          <span class="visibility-text">
                            <span class="visibility-name">공개</span>
                            <span class="visibility-desc">검색과 목록에서 누구나 확인하고 참여할 수 있어요.</span>
                          </span>
                        </label>

                        <label class="visibility-card">
                          <input type="radio" name="status" value="PRIVATE">
                          <span class="visibility-icon" aria-hidden="true">
                            <svg viewBox="0 0 48 48">
                              <rect x="14" y="21" width="20" height="17" rx="2"></rect>
                              <path d="M18 21v-6a6 6 0 0 1 12 0v6"></path>
                              <path d="M24 28v4"></path>
                              <circle cx="24" cy="27" r="1.5"></circle>
                            </svg>
                          </span>
                          <span class="visibility-text">
                            <span class="visibility-name">비공개</span>
                            <span class="visibility-desc">초대받은 사용자만 플래너즈 정보를 볼 수 있어요.</span>
                          </span>
                        </label>
                      </div>
                    </div>

                    <input type="hidden" name="tid" th:value="${plannersDTO.tid}">

                    <div class="button-row">
                      <button type="submit" class="submit-btn">수정하기</button>
                    </div>
                  </section>
                </form>
              </div>

              <div id="invite-planners" class="tab-content" style="display: none;">
                <input type="email" class="invite-email" placeholder="초대할 사용자의 이메일을 입력하세요">
                <div class="email-list-box"></div>
              </div>

              <div id="delete-planners" class="tab-content" style="display: none;">
                <h2 style="text-align: center; margin-top: 10px;">플래너즈를 삭제하시겠습니까?</h2>
                <p style="text-align: center; margin-top: 20px;">이 작업은 되돌릴 수 없습니다.</p>
                <button type="button" class="delete-btn" th:onclick="|deletePlanners(${plannersDTO.tid})|">삭제하기</button>
              </div>

              <div id="join-planners" class="tab-content" style="display: none;">
                <h2>플래너즈 가입 양식 설정</h2>
                <div id="form-builder" style="margin-top: 15px;"></div>

                <button type="button" onclick="addQuestion()" class="question-btn">+ 질문 추가하기</button>
                <button type="button" onclick="saveForm()" class="form-btn">양식 저장하기</button>
              </div>

              <div id="manage-applications" class="tab-content" style="display: none;">
                <h2>가입 신청 목록</h2>
                <div id="applications-list" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;"></div>
              </div>

              <div id="schedule-block" class="tab-content" style="display: none;">
                <input type="text" class="add-activity" placeholder="추가할 일정 내용을 입력해주세요">
                <div class="activity-list-box"></div>
              </div>
            </div>
          </div>
            </section>
          </article>
        </div>
      </main>
    </th:block>
    <script th:inline="javascript">
      const loginUser = /*[[${#authentication.principal}]]*/ "loginUser";
      const adminEmail = /*[[${plannersDTO.adminEmail}]]*/ "adminEmail";
      const tid = /*[[${plannersDTO.tid}]]*/"tid";

      window.addEventListener("load",()=>{
        if (loginUser.email !== adminEmail) {
          alert("잘못된 접근입니다.");
          window.history.back();
          return;
        }

        document.body.style.display = "block";
        initPage()
      });

      const buttons = document.querySelectorAll(".interact-btn");

      function showTab(tabId) {
        const tabs = document.querySelectorAll(".tab-content");
        tabs.forEach((tab) => {
          if (tab.id === tabId) {
            tab.style.display = "block";
          } else {
            tab.style.display = "none";
          }
        });
      }

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          buttons.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
        });
      });

      (function () {
        const form = document.getElementById("plannersModifyForm");

        if (!form) {
          return;
        }

        function bindImagePreview(inputId, previewId) {
          const input = document.getElementById(inputId);
          const preview = document.getElementById(previewId);

          input.addEventListener("change", function (e) {
            const file = e.target.files[0];

            if (!file) {
              return;
            }

            const reader = new FileReader();
            reader.addEventListener("load",(event)=>{
              preview.style.backgroundImage =
                "url(" + event.target.result + ")";
              preview.style.backgroundSize = "cover";
              preview.style.backgroundPosition = "center";
              preview.innerHTML = "";
            });
            reader.readAsDataURL(file);
          });
        }

        bindImagePreview("plannersThumbnail", "thumbnailPreview");
        bindImagePreview("plannersBanner", "bannerPreview");

        form.addEventListener("submit", function (e) {
          const requiredFields = [
            {
              id: "maxPopulation",
              message: "플래너즈 인원 제한을 입력해주세요.",
            },
          ];

          for (const field of requiredFields) {
            const input = document.getElementById(field.id);

            if (!input.value.trim()) {
              e.preventDefault();
              alert(field.message);
              input.focus();
              return;
            }
          }

          const population = document.getElementById("maxPopulation");
          const populationValue = Number(population.value);

          if (
            !Number.isInteger(populationValue) ||
            populationValue < 1 ||
            populationValue > 100
          ) {
            e.preventDefault();
            alert("플래너즈 인원 제한은 1명부터 100명까지 입력할 수 있습니다.");
            population.focus();
          }
        });
      })();

      const inviteEmailInput = document.querySelector(".invite-email");

      inviteEmailInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          const url = "/planners/search_invitee?email=";
          const email = inviteEmailInput.value.trim();

          if (!email) {
            alert("이메일을 입력해주세요.");
            return;
          }

          fetch(url + email, { method: "GET" })
            .then((res) => res.json())
            .then((users) => {
              if (users.length === 0) {
                alert("해당 이메일을 가진 사용자를 찾을 수 없습니다.");
              } else {
                showEmailList(users);
              }
            });
        }
      });

      const emailList = document.querySelector(".email-list-box");

      function showEmailList(users) {
        emailList.innerHTML = "";
        emailList.style.display = "flex";

        for (user of users) {
          if (user.email === loginUser.email) {
            continue;
          }
          emailList.innerHTML += `<div class="email-list" onclick="selectEmail('${user.email}')">${user.name}(${user.email})</div>`;
        }
      }

      function selectEmail(email) {
        if (confirm(`'${email}'님을 플래너즈에 초대하시겠습니까?`)) {
          const url = "/planners/invite?tid=";
          const csrfToken =
            document.querySelector('meta[name="_csrf"]').content;
          const csrfHeader = document.querySelector(
            'meta[name="_csrf_header"]',
          ).content;
          fetch(url + "[[${plannersDTO.tid}]]" + "&email=" + email, {
            method: "POST",
            headers: { [csrfHeader]: csrfToken },
          }).then((res) => {
            if (res.status === 200) {
              alert("플래너즈에 성공적으로 초대되었습니다.");
              emailList.style.display = "none";
              inviteEmailInput.value = "";
            } else if (res.status === 400) {
              alert("존재하지 않는 사용자입니다.");
            } else if (res.status === 409) {
              alert("이미 초대된 사용자이거나 플래너즈의 멤버입니다.");
            } else {
              throw new Error("예기치 못한 오류 발생");
            }
          });
        }
      }

      function deletePlanners(tid) {
        if (confirm("정말로 삭제하시겠습니까?")) {
          const url = "/planners/delete?tid=";
          const csrfToken =
            document.querySelector('meta[name="_csrf"]').content;
          const csrfHeader = document.querySelector(
            'meta[name="_csrf_header"]',
          ).content;
          fetch(url + tid, {
            method: "POST",
            headers: { [csrfHeader]: csrfToken },
          }).then((res) => {
            if (res.status === 200) {
              alert("플래너즈가 성공적으로 삭제되었습니다.");
              window.location.href = "/planners/list";
            } else {
              throw new Error("예기치 못한 오류 발생");
            }
          });
        }
      }

      // 가입 양식 및 신청 관리 스크립트
      let questionCount = 0;
      function addQuestion(value = '') {
        if (questionCount + 1 > 5) {
          alert("질문은 최대 5개까지 가능합니다.")
          return
        }
        questionCount++;
        const builder = document.getElementById('form-builder');
        const div = document.createElement('div');
        div.className = 'question-item';
        div.style.marginBottom = '10px';
        div.innerHTML = `
                <label>질문 ${questionCount}: </label>
                <input type="text" class="question-input" style="width: 70%; padding: 8px; border-radius: 8px; border: 1px solid #ccc;" placeholder="가입 동기가 무엇인가요?" required>
                <button type="button" onclick="removeQuestion(this)" style="padding: 8px; border-radius: 8px; background-color: #ff4d4d; color: white; border: none; cursor:pointer;">삭제</button>
            `;
        div.querySelector('.question-input').value = value;
        builder.appendChild(div);
      }

      function removeQuestion(ele) {
        ele.parentElement.remove()
        questionCount--
      }

      function loadForm() {
        const tid = /*[[${plannersDTO.tid}]]*/'tid'
        fetch(`/planners/join/${tid}/form`)
          .then(res => res.json())
          .then(data => {
            if(data && data.length > 0) {
              data.forEach(item => addQuestion(item.question));
            } else {
              addQuestion(); // 기본 질문 1개
            }
          });
      }

      function saveForm() {
        const inputs = document.querySelectorAll('.question-input');
        const formSchema = [];

        inputs.forEach(input => {
          if(input.value.trim() !== '') {
            formSchema.push({ question: input.value.trim() });
          }
        });

        const tid = /*[[${plannersDTO.tid}]]*/'tid'
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        fetch(`/planners/join/${tid}/form`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            [csrfHeader]: csrfToken
          },
          body: JSON.stringify({ formSchema: formSchema })
        }).then(response => {
          if(response.ok) alert('양식이 성공적으로 저장되었습니다.');
        });
      }

      function loadApplications() {
        const tid = /*[[${plannersDTO.tid}]]*/'tid'
        fetch(`/planners/join/${tid}/applications`)
          .then(res => res.json())
          .then(data => {
            const list = document.getElementById('applications-list');
            list.innerHTML = '';
            if(data.length === 0) {
              list.innerHTML = '<p>가입 신청이 없습니다.</p>';
              return;
            }
            data.forEach(app => {
              let answersHtml = app.answers.map(a => `<p><strong>Q: ${a.question}</strong><br>A: ${a.answer}</p>`).join('');
              let actionHtml = '';
              if (app.status === 'PENDING') {
                 actionHtml = `
                   <button onclick="approveApp(${app.id}, this)" style="padding:8px 12px; background:#2563eb; color:#fff; border:none; border-radius:8px; cursor:pointer;">승인</button>
                   <button onclick="rejectApp(${app.id}, this)" style="padding:8px 12px; background:#ef4444; color:#fff; border:none; border-radius:8px; cursor:pointer;">거절</button>
                 `;
              } else {
                 actionHtml = `<span style="font-weight:bold; color:${app.status==='APPROVED'?'#16a34a':'#ef4444'}">${app.status}</span>`;
              }

              const div = document.createElement('div');
              div.style.border = '1px solid #ccc';
              div.style.padding = '15px';
              div.style.borderRadius = '10px';
              div.innerHTML = `
                <h4>신청자: ${app.userName} (${app.userEmail})</h4>
                <div style="margin: 10px 0;">${answersHtml}</div>
                <div>${actionHtml}</div>
              `;
              list.appendChild(div);
            });
          });
      }

      function approveApp(id, ele) {
        if(!confirm('승인하시겠습니까?')) return;
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
        fetch(`/planners/join/applications/${id}/approve`, {
          method: 'POST',
          headers: { [csrfHeader]: csrfToken }
        }).then(res => {
           if(res.ok) { 
             alert('승인되었습니다.');
             ele.remove()
             loadApplications();
           }
        });
      }

      function rejectApp(id, ele) {
        if(!confirm('거절하시겠습니까?')) return;
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
        fetch(`/planners/join/applications/${id}/reject`, {
          method: 'POST',
          headers: { [csrfHeader]: csrfToken }
        }).then(res => {
           if(res.ok) { 
             alert('거절되었습니다.'); 
             ele.remove()
             loadApplications(); 
           }
        });
      }

      // 활동 블럭 조회
      function loadActivityList() {
        const tid = /*[[${plannersDTO.tid}]]*/'tid'
        const url = '/planners/activity?tid=';
      
        fetch(url + tid, {method: "GET"})
          .then(res => res.json())
          .then(data => {
            const activityList = document.querySelector(".activity-list-box")
            let str = '';
            if (data.length === 0) {
              activityList.style.border = 'none';
              str = '<p style="text-align: center; margin-top: 100px;">생성된 일정 블럭이 없습니다.</p>';
            } else {
              activityList.style.border = '1px solid rgba(148, 163, 184, 0.92)';
              for (const activity of data) {
                str += `<div class="activity-block-list" onclick="removeActivityBlock('${activity.bid}')">${activity.name}</div>`
              }
            }
            activityList.innerHTML = str;
          })
      }

      const addActivityInput = document.querySelector(".add-activity");

      // 활동 블럭 생성
      addActivityInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          const activity = addActivityInput.value.trim();
          const csrfToken = document.querySelector('meta[name="_csrf"]').content;
          const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

          if (!activity) {
            alert("활동 내용을 입력해주세요.");
            return;
          }

          if (confirm("활동 블럭을 추가하시겠습니까?")) {
            fetch('/planners/activity?tid=' + tid + '&name=' + activity, {method: "POST", headers: { [csrfHeader]: csrfToken }})
              .then(res => {
              if(res.status === 200) { 
                alert('일정 블럭이 추가되었습니다.');
                addActivityInput.value = '';
                loadActivityList();
                return;
              }
              alert("예기치 못한 오류 발생");
            })
          }
        }
      })

      // 활동 블럭 삭제
      function removeActivityBlock(bid) {
        const url = '/planners/activity?bid='
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
        if (confirm("활동 블럭을 삭제하시겠습니까?")) {
          fetch(url + bid, {method: "DELETE", headers: { [csrfHeader]: csrfToken }})
            .then(res => {
              if (res.status === 200) {
                alert("일정 블럭이 삭제되었습니다.");
                loadActivityList();
                return;
              }
              alert("예기치 못한 오류 발생");
            })
        }
      }

      // 탭 변경 로직
      const originalShowTab = showTab;
      showTab = function(tabId) {
        originalShowTab(tabId);
        if (tabId === 'manage-applications') {
          loadApplications();
        } else if (tabId === 'schedule-block') {
          loadActivityList();
        }
      };

      loadForm();

      // URL의 hash 또는 tab 파라미터 확인해서 탭 열기
      const urlParams = new URLSearchParams(window.location.search);
      const tabParam = urlParams.get('tab');
      const hashParam = window.location.hash.substring(1);
      
      const targetTab = tabParam || hashParam;
      if (targetTab) {
        showTab(targetTab);
        // 해당하는 버튼 활성화
        buttons.forEach((btn) => {
          if (btn.getAttribute("onclick") && btn.getAttribute("onclick").includes(targetTab)) {
            buttons.forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
          }
        });
      }
    </script>
    <script th:src="@{/js/header.js}"></script>
    <script th:src="@{/js/plannersTap.js}"></script>
    <div th:replace="~{layout/footer}"></div>
  </body>
</html>
