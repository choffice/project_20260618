<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>플래너즈 :: 리뷰페이지</title>
    <!-- <link rel="icon" href="/favicon.ico" />-->
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/plannersTap.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <style>
      .title {
        border-bottom: 1px solid var(--border);
        margin-bottom: 28px;
      }

      .review-title {
        font-size: 2.2rem;
        font-weight: bold;
        margin: 0 0 18px;
        text-align: center;
      }

      .review-form {
        max-width: 720px;
        margin: 0 auto;
      }

      .form-group {
        margin-bottom: 22px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--text);
        font-weight: 800;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        font: inherit;
        color: var(--text);
        background: #fff;
      }

      .form-group textarea {
        min-height: 180px;
        resize: vertical;
        line-height: 1.6;
      }

      .star-rating {
        display: inline-flex;
        flex-direction: row-reverse;
        gap: 6px;
      }

      .star-rating label {
        font-size: 2rem;
        color: #d1d5db;
        cursor: pointer;
        transition: color 0.2s ease;
      }

      .star-rating input {
        display: none;
      }

      .star-rating input:checked ~ label {
        color: #facc15;
      }

      .star-rating label:hover,
      .star-rating label:hover ~ label {
        color: #facc15;
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 30px;
      }

      .cancel-btn,
      .submit-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 120px;
        height: 42px;
        border-radius: 10px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
      }

      .cancel-btn {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
      }

      .submit-btn {
        border: none;
        background: var(--blue);
        color: #fff;
      }

      .cancel-btn:hover {
        background: #f1f3f5;
      }

      .submit-btn:hover {
        background: #2563eb;
      }
    </style>
    <div th:replace="~{layout/chat_socket}"></div>
  </head>
  <body>
    <div th:replace="~{layout/header}"></div>
    <th:block>
      <main class="detail-main">
        <div class="detail-shell">
          <div th:replace="~{layout/plannersTap}"></div>
          <article class="detail-card">
            <p th:if="${!isMember}" class="empty-message" style="margin: 32px">
              플래너즈에 가입된 회원만 작성 가능합니다
            </p>
            <section
              class="info-section"
              sec:authorize="isAuthenticated()"
              th:if="${isMember}"
            >
              <div class="title">
                <h2 class="review-title">리뷰 작성</h2>
              </div>

              <form
                class="review-form"
                th:action="@{/planners/reviewForm}"
                method="post"
              >
                <input type="hidden" name="tid" th:value="${plannersDTO.tid}" />

                <div class="form-group">
                  <label for="reviewTitle">리뷰 제목</label>
                  <input
                    type="text"
                    id="reviewTitle"
                    name="reviewTitle"
                    placeholder="제목을 입력하세요"
                    required
                  />
                </div>

                <div class="form-group">
                  <label>평점</label>
                  <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5">
                    <label for="star5">★</label>

                    <input type="radio" id="star4" name="rating" value="4">
                    <label for="star4">★</label>

                    <input type="radio" id="star3" name="rating" value="3">
                    <label for="star3">★</label>

                    <input type="radio" id="star2" name="rating" value="2">
                    <label for="star2">★</label>

                    <input type="radio" id="star1" name="rating" value="1">
                    <label for="star1">★</label>
                  </div>
                </div>

                <div class="form-group">
                  <label for="content">리뷰 내용</label>
                  <textarea
                    id="content"
                    name="content"
                    placeholder="플래너즈 활동에 대한 리뷰를 작성하세요"
                    required
                  ></textarea>
                </div>

                <div class="form-actions">
                  <a
                    class="cancel-btn"
                    th:href="@{/planners/review(tid=${plannersDTO.tid})}"
                  >
                    취소
                  </a>

                  <button type="submit" class="submit-btn">등록</button>
                </div>
              </form>
            </section>
          </article>
        </div>
      </main>
    </th:block>
    <script th:inline="javascript">
      window.addEventListener("load",()=>{
        initPage();
      });
    </script>
    <script th:src="@{/js/header.js}"></script>
    <script th:src="@{/js/plannersTap.js}"></script>
    <div th:replace="~{layout/footer}"></div>
  </body>
</html>
