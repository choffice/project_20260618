<div th:replace="~{layout/chat_app}"></div>
<script>
  window.addEventListener("load", () => {
    if (document.querySelector(".chat-area") != null) {
      if (user_id == 0) newChat.clear();

      const lastMsg = sessionStorage.getItem("lastmsg");
      const chatState = JSON.parse(sessionStorage.getItem("chatWindow"));
      if (lastMsg != null) {
        chatMessages.innerHTML = sessionStorage.getItem("lastmsg");
      }
      if (chatState != null) {
        chatArea.className = chatState.chatArea;
        chatArea.className.includes("close")
          ? newChat.closexy()
          : newChat.openxy();
        if (chatArea.style.inset != null)
          chatArea.style.inset = chatState.inset;
      }
      chatMessages.style.scrollBehavior = "auto";
      chatMessages.scrollTop = chatMessages.scrollHeight;
      setTimeout(() => (chatMessages.style.scrollBehavior = "smooth"), 100);
    }
    //피카배구
    if (location.search.includes("tid=66")) {
      pageToLink("https://gorisanson.github.io/pikachu-volleyball/ko/");
    }
  });
</script>
