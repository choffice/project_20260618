<nav class="detail-tabs" aria-label="플래너즈 상세 메뉴">
  <button type="button" class="detail" onclick="goPage(0)">세부정보</button>
  <button type="button" class="member" onclick="goPage(1)">플래너</button>
  <button type="button" class="schedule" onclick="goPage(2)">일정</button>
  <button type="button" class="review" onclick="goPage(3)">리뷰</button>
  <button
    type="button"
    class="admin"
    sec:authorize="isAuthenticated()"
    th:if="${#authentication.principal.email == plannersDTO.adminEmail}"
    data-admin-tab
    onclick="goPage(4)"
  >
    관리자
  </button>

  <div class="tab-actions">
    <button
      sec:authorize="isAuthenticated()"
      type="button"
      th:onclick="|event.stopPropagation(); favorite(${plannersDTO.tid})|"
      class="heart-btn detail-favorite-btn"
      th:classappend="${active}"
      aria-label="찜하기"
    >
      <svg viewBox="0 0 24 24" class="heart-icon" aria-hidden="true">
        <path
          d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41 0.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.53L12 21.35z"
        />
      </svg>
    </button>
    <button
      sec:authorize="isAnonymous()"
      type="button"
      th:onclick="|event.stopPropagation(); tologin(${plannersDTO.tid})|"
      class="heart-btn detail-favorite-btn"
      aria-label="찜하기"
    >
      <svg viewBox="0 0 24 24" class="heart-icon" aria-hidden="true">
        <path
          d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41 0.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.53L12 21.35z"
        />
      </svg>
    </button>
    <a
      th:unless="${isMember}"
      th:href="@{/planners/join(tid=${plannersDTO.tid})}"
      class="create-btn"
      >가입하기</a
    >
    <a
      sec:authorize="isAuthenticated()"
      th:if="${isMember and owner.uid != #authentication.principal.uid}"
      href="#"
      th:onclick="|leaveByTid(${plannersDTO.tid})|"
      class="leave-btn"
      >떠나기</a
    >
    <button
      type="button"
      class="back-btn"
      th:attr="
        data-page=${pageRequestDTO.page},
        data-keyword=${pageRequestDTO.keyword},
        data-location=${pageRequestDTO.location},
        data-category=${pageRequestDTO.category},
        data-sort=${pageRequestDTO.sort}"
      onclick="goPlannersList(this)"
    >
      <span class="material-symbols-outlined" aria-hidden="true"></span>
      목록으로
    </button>
  </div>

  <div th:if="${toastMessage}" class="custom-toast" id="customToast">
    <span th:text="${toastMessage}"></span>
  </div>
</nav>
