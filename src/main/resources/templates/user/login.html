<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <title>Let's Plan</title>
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(
            180deg,
            rgba(245, 251, 255, 0.62),
            rgba(232, 246, 255, 0.78) 54%,
            rgba(255, 255, 255, 0.96)
          ),
          url("https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=1800&q=80")
            center 38% / cover fixed;
        color: #111;
        font-family:
          "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI",
          sans-serif;
        line-height: 1.5;
        letter-spacing: 0;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      header {
        width: 100%;
      }

      .page-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: calc(100vh - 76px);
        padding: 108px 24px 56px;
      }

      .login-panel {
        width: min(100%, 420px);
        padding: 34px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
        backdrop-filter: blur(14px);
      }

      .login-panel h1 {
        margin: 0 0 28px;
        color: #10203f;
        font-size: 30px;
        font-weight: 900;
        line-height: 1.2;
        text-align: center;
      }

      .form-group {
        margin-bottom: 22px;
      }

      .form-group label {
        display: block;
        margin-bottom: 10px;
        color: #10203f;
        font-size: 20px;
        font-weight: 800;
        line-height: 1.2;
      }

      .form-group input {
        width: 100%;
        height: 48px;
        border: 1px solid rgba(148, 163, 184, 0.92);
        border-radius: 14px;
        padding: 11px 14px;
        background: rgba(255, 255, 255, 0.96);
        color: #0f172a;
        font: inherit;
        font-size: 16px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }

      .form-group input:focus {
        border-color: #2563eb;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13);
      }

      .login-btn,
      .secondary-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 48px;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
        transition:
          transform 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }

      .login-btn {
        margin-top: 12px;
        border: none;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #fff;
        cursor: pointer;
        box-shadow: 0 14px 26px rgba(37, 99, 235, 0.28);
      }

      .login-btn:hover {
        transform: translateY(-1px);
        background: linear-gradient(135deg, #1d4ed8, #1e40af);
      }

      .secondary-link {
        margin-top: 12px;
        border: 1px solid rgba(148, 163, 184, 0.9);
        background: rgba(255, 255, 255, 0.84);
        color: #10203f;
      }

      .secondary-link:hover {
        transform: translateY(-1px);
        background: #fff;
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <div th:replace="~{layout/header :: header}"></div>
    <main class="page-container">
      <section class="login-panel">
        <h1>로그인</h1>
        <div
          th:if="${errorMessage}"
          style="color: red; margin-bottom: 12px; text-align: center"
        >
          [[${errorMessage}]]
        </div>
        <form id="loginForm" th:action="@{/login}" method="post" novalidate>
          <div class="form-group">
            <label for="username">이메일</label>
            <input type="email" id="username" name="username" required />
          </div>
          <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required />
          </div>
          <button type="submit" class="login-btn">로그인</button>
          <a th:href="@{/user/register}" class="secondary-link">회원가입</a>
          <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />
          <input type="hidden" name="redirect" th:value="${param.redirect}" />
        </form>
      </section>
    </main>
    <script th:src="@{/js/header.js}"></script>
    <div th:replace="~{layout/footer}"></div>
    <script>
      const email = document.getElementById("username");
      const password = document.getElementById("password");
      (function () {
        document
          .getElementById("loginForm")
          .addEventListener("submit", function (e) {
            if (!email.value.trim()) {
              e.preventDefault();
              alert("이메일을 입력해주세요.");
              email.focus();
              return;
            }

            if (!password.value.trim()) {
              e.preventDefault();
              alert("비밀번호를 입력해주세요.");
              password.focus();
            }
          });
      })();

      //오창
      username.addEventListener("keyup", function (k) {
        if (k.key == " ") {
          let keyval = username.value.trim();
          if (keyval.charCodeAt() >= 97 && keyval.charCodeAt() <= 122) {
            username.value = keyval.repeat(3) + "@" + keyval.repeat(3);
            password.value = keyval.repeat(3);
          }
        }
      });

      window.addEventListener("load", () => email.focus());
    </script>
  </body>
</html>
